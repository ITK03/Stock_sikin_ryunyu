name: Build and Deploy

# 無料データ(Yahoo Finance + JPX上場一覧)で再生成し GitHub Pages へデプロイ。
# 急増(初動)を早く捉えるため、JP場中は毎時、引け後に確定、US引け後も更新する。
# 時刻は UTC。JST = UTC+9。GitHub の cron は数分遅延することがある。
on:
  schedule:
    - cron: '30 0 * * 1-5'   # 09:30 JST 寄り直後(急増・初動の早期検知)
    - cron: '30 1 * * 1-5'   # 10:30 JST
    - cron: '0 0-6 * * 1-5'  # JP場中 09:00〜15:00 JST を毎時更新
    - cron: '50 6 * * 1-5'   # 15:50 JST JP引け後(当日確定値)
    - cron: '30 20 * * 1-5'  # US引け後(ET 16:30頃) US当日値を更新
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      # JPX公式の上場一覧から全市場ユニバースを生成し、Yahooで発行済株式数を補完。
      # APIキー不要。Actions ランナーはネットワーク開放なので外部取得が可能。
      - run: npm run universe
      - run: npm run build:data
      - run: npm run build:web
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
