name: Build and Deploy

# 無料データ(Yahoo Finance + JPX上場一覧)で再生成し GitHub Pages へデプロイ。
# できるだけ新しい値にするため平日の市場時間帯〜引け後に複数回実行する。
# 時刻は UTC。JST = UTC+9。
on:
  schedule:
    - cron: '30 3 * * 1-5' # 12:30 JST 場中スナップショット
    - cron: '10 6 * * 1-5' # 15:10 JST 引け直前
    - cron: '50 6 * * 1-5' # 15:50 JST 引け後(当日確定値)
  workflow_dispatch: {}
  push:
    branches: [main, claude/jp-stock-inflow-tool-evy4mz]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      # JPX公式の上場一覧から全市場ユニバースを生成し、Yahooで発行済株式数を補完。
      # APIキー不要。Actions ランナーはネットワーク開放なので外部取得が可能。
      - run: npm run universe
      - run: npm run build:data
      - run: npm run build:web
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
